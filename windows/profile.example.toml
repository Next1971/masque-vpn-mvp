# Example MASQUE Windows client profile (sanitized).
# This file uses placeholders only. Replace with your own server and certificate
# material when configuring a real client.

[server]
# MASQUE server address and port (CONNECT-IP over QUIC).
address = "vpn.example.com:4433"
name    = "vpn.example.com"

[tun]
# DNS server used inside the tunnel.
dns = "1.1.1.1"

[tls]
# CA certificate used to validate the MASQUE server (PEM format).
# Place your real CA in certs/ca.crt and point to it here.
ca = """
-----BEGIN CERTIFICATE-----
EXAMPLE_CA_CERTIFICATE_PLACEHOLDER
-----END CERTIFICATE-----
"""

# Client certificate for mTLS (PEM format).
cert = """
-----BEGIN CERTIFICATE-----
EXAMPLE_CLIENT_CERT_PLACEHOLDER
-----END CERTIFICATE-----
"""

# Client private key (PEM format).
# IMPORTANT: never commit real private keys to a public repository.
key = """
-----BEGIN PRIVATE KEY-----
EXAMPLE_PRIVATE_KEY_PLACEHOLDER
-----END PRIVATE KEY-----
"""
