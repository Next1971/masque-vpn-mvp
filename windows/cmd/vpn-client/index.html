<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MASQUE VPN</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; margin: 10px; }
        #status { font-weight: bold; margin-top: 20px; font-size: 20px; }
        .on { background-color: #4CAF50; color: white; }
        .off { background-color: #f44336; color: white; }
    </style>
</head>
<body>
    <h2>MASQUE VPN Client</h2>
    <input type="file" id="fileInput" accept=".toml">
    <br>
    <button id="toggleBtn" class="off" onclick="toggleVPN()">ВКЛЮЧИТЬ</button>
    <div id="status">Отключено</div>

    <script>
        let isRunning = false;

        async function toggleVPN() {
            const btn = document.getElementById('toggleBtn');
            const status = document.getElementById('status');
            const fileInput = document.getElementById('fileInput');

            if (!isRunning) {
                if (!fileInput.files[0]) {
                    alert("Сначала выберите файл profile.client.toml!");
                    return;
                }

                // Загружаем файл на сервер
                const formData = new FormData();
                formData.append("file", fileInput.files[0]);
                
                status.innerText = "Загрузка конфига...";
                await fetch('/upload', { method: 'POST', body: formData });

                // Включаем VPN
                status.innerText = "Подключение...";
                const res = await fetch('/connect', { method: 'POST' });
                const data = await res.json();

                if (data.status === 'ok') {
                    isRunning = true;
                    btn.innerText = "ВЫКЛЮЧИТЬ";
                    btn.className = "on";
                    status.innerText = "Подключено: " + data.ip;
                } else {
                    status.innerText = "Ошибка: " + data.error;
                }
            } else {
                // Выключаем VPN
                status.innerText = "Отключение...";
                await fetch('/disconnect', { method: 'POST' });
                isRunning = false;
                btn.innerText = "ВКЛЮЧИТЬ";
                btn.className = "off";
                status.innerText = "Отключено";
            }
        }
    </script>
</body>
</html>
